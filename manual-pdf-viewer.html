<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <title>Manual PDF Viewer</title>
  <script src="/theme.js"></script>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --panel-border: rgba(148, 163, 184, 0.22);
      --text: #e5eefc;
      --muted: #94a3b8;
      --accent: #60a5fa;
      --page-bg: #ffffff;
      --page-shadow: 0 12px 30px rgba(15, 23, 42, 0.28);
    }

    body.theme-light {
      --bg: #f3f6fb;
      --panel: #ffffff;
      --panel-border: rgba(17, 24, 39, 0.12);
      --text: #0f172a;
      --muted: #475569;
      --accent: #2563eb;
      --page-bg: #ffffff;
      --page-shadow: 0 8px 20px rgba(15, 23, 42, 0.12);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font: 14px/1.45 Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      padding: 12px;
    }

    .viewer {
      width: min(100%, 980px);
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .status {
      position: sticky;
      top: 0;
      z-index: 10;
      padding: 10px 12px;
      border: 1px solid var(--panel-border);
      border-radius: 14px;
      background: rgba(17, 24, 39, 0.92);
      backdrop-filter: blur(12px);
      color: var(--muted);
    }

    .status[hidden] {
      display: none;
    }

    .status strong {
      color: var(--text);
      font-weight: 600;
    }

    .status.error {
      border-color: rgba(248, 113, 113, 0.45);
      color: #fecaca;
    }

    .pages {
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding-bottom: 12px;
    }

    .page {
      display: block;
      width: 100%;
      background: var(--page-bg);
      border-radius: 18px;
      box-shadow: var(--page-shadow);
    }

    .page-shell {
      position: relative;
    }

    .page-label {
      position: absolute;
      right: 12px;
      bottom: 12px;
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.72);
      color: #fff;
      font-size: 12px;
      letter-spacing: 0.02em;
    }

    .empty {
      padding: 32px 18px;
      border: 1px dashed var(--panel-border);
      border-radius: 18px;
      text-align: center;
      color: var(--muted);
      background: rgba(15, 23, 42, 0.24);
    }

    .theme-fab {
      position: fixed;
      right: 12px;
      bottom: 12px;
      z-index: 20;
      width: 42px;
      height: 42px;
      border-radius: 999px;
      border: 1px solid var(--panel-border);
      background: var(--panel);
      color: var(--text);
      box-shadow: var(--page-shadow);
    }

    @media (max-width: 640px) {
      body { padding: 8px; }
      .viewer { gap: 10px; }
      .status {
        top: 8px;
        border-radius: 12px;
        padding: 9px 10px;
      }
      .pages { gap: 10px; }
      .page { border-radius: 14px; }
    }
  </style>
</head>
<body>
  <main class="viewer">
    <div id="status" class="status" hidden></div>
    <div id="pages" class="pages" hidden></div>
    <div id="empty" class="empty" hidden>Не удалось определить документ для предпросмотра.</div>
  </main>
  <button id="theme-btn-floating" class="theme-fab" type="button" title="Тема">☀️</button>

  <script type="module" src="/manual-pdf-viewer.js"></script>
</body>
</html>
