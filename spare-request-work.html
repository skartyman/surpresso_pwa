  <script>
    const PARTS_SHEET_ID = "1kHTj9-Hh5ZjR1iHKXEiAxKx6XSsd_RE2SDJq9eBqRZ8";
    const PARTS_GID = 1099059228;
    let currentRequest = null;
    let partsCatalogPromise = null;
    let partsLookupByCode = new Map();
    let partsLookupByName = new Map();
    let partsFullList = [];
    let replaceCurrentItem = null;
    let replaceSelectedItem = null;
    let selectedRowIndex = null;
    let savedQtyValues = {};
    let pickState = {
      done: new Set(),
      skipped: new Set(),
      missing: [],
      trello: [],
      sorted: []
    };

    function getPwaKey() {
      let key = localStorage.getItem("surpresso_pwa_key");
      if (!key) {
        key = (prompt("Введи ключ доступа (PWA Key):") || "").trim();
        if (!key) throw new Error("NO_PWA_KEY");
        localStorage.setItem("surpresso_pwa_key", key);
      }
      return key;
    }

    async function apiFetch(url, options = {}) {
      const key = getPwaKey();
      const headers = { ...(options.headers || {}), "x-surpresso-key": key };
      if (options.body && !(options.body instanceof FormData)) {
        headers["Content-Type"] = headers["Content-Type"] || "application/json";
      }
      let resp = await fetch(url, { ...options, headers });
      if (resp.status === 401) {
        localStorage.removeItem("surpresso_pwa_key");
        const newKey = (prompt("Ключ доступа недействителен. Введи новый PWA Key:") || "").trim();
        if (!newKey) return resp;
        localStorage.setItem("surpresso_pwa_key", newKey);
        const rh = { ...(options.headers || {}), "x-surpresso-key": newKey };
        if (options.body && !(options.body instanceof FormData)) {
          rh["Content-Type"] = rh["Content-Type"] || "application/json";
        }
        resp = await fetch(url, { ...options, headers: rh });
      }
      return resp;
    }

    function normalizeKey(value) {
      return String(value || "").trim().toLowerCase().replace(/\s+/g, " ");
    }

    function headerIndex(headers, patterns) {
      for (let i = 0; i < headers.length; i += 1) {
        const header = String(headers[i] || "").trim();
        if (!header) continue;
        for (const pattern of patterns) {
          if (header.includes(pattern)) return i;
        }
      }
      return -1;
    }

    function parseCsv(text) {
      const rows = [];
      let row = [];
      let cell = "";
      let inQuotes = false;
      const src = String(text || "");
      for (let i = 0; i < src.length; i += 1) {
        const ch = src[i];
        const next = src[i + 1];
        if (inQuotes) {
          if (ch === '"' && next === '"') {
            cell += '"';
            i += 1;
          } else if (ch === '"') {
            inQuotes = false;
          } else {
            cell += ch;
          }
          continue;
        }
        if (ch === '"') { inQuotes = true; continue; }
        if (ch === ',') { row.push(cell); cell = ""; continue; }
        if (ch === '\r') continue;
        if (ch === '\n') {
          row.push(cell);
          rows.push(row);
          row = [];
          cell = "";
          continue;
        }
        cell += ch;
      }
      row.push(cell);
      if (row.length > 1 || String(row[0] || "").trim() !== "") rows.push(row);
      return rows;
    }

    async function loadPartsCatalog() {
      if (partsCatalogPromise) return partsCatalogPromise;
      partsCatalogPromise = (async () => {
        const url = `/api/parts-catalog?v=${Date.now()}`;
        const resp = await fetch(url, { cache: "no-store" });
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const text = await resp.text();
        const rows = parseCsv(text);
        const headerRow = rows.shift() || [];
        const headers = headerRow.map(h => normalizeKey(h));
        const idx = {
          code: headerIndex(headers, ["артикул", "артик", "код", "code", "partcode", "part code"]),
          name: headerIndex(headers, ["наймен", "наимен", "назван", "name", "partname", "part name"]),
          cell: headerIndex(headers, ["комір", "комир", "ячей", "cell", "slot", "location"]),
          stock: headerIndex(headers, ["залиш", "остат", "налич", "кіль", "колич", "stock", "qty", "quantity"]),
        };
        if (idx.code < 0 && headerRow.length > 0) idx.code = 0;
        if (idx.name < 0 && headerRow.length > 2) idx.name = 2;
        if (idx.cell < 0 && headerRow.length > 1) idx.cell = 1;
        if (idx.stock < 0 && headerRow.length > 4) idx.stock = 4;
        partsLookupByCode = new Map();
        partsLookupByName = new Map();
        partsFullList = [];
        for (const row of rows) {
          const code = String(row[idx.code] || "").trim();
          const name = String(row[idx.name] || "").trim();
          const cell = String(row[idx.cell] || "").trim();
          const stock = idx.stock >= 0 ? row[idx.stock] : "";
          if (code) partsLookupByCode.set(normalizeKey(code), { code, name, cell, stock: stock || "" });
          if (name) partsLookupByName.set(normalizeKey(name), { code, name, cell, stock: stock || "" });
          if (code || name) partsFullList.push({ code, name, cell, stock: stock || "" });
        }
      })().catch(() => {
        partsLookupByCode = new Map();
        partsLookupByName = new Map();
        partsFullList = [];
      });
      return partsCatalogPromise;
    }

    function isLikelyDateCell(value) {
      const s = String(value || "").trim();
      return /^(Sun|Mon|Tue|Wed|Thu|Fri|Sat)\s/i.test(s) ||
        /\bGMT\b/i.test(s) ||
        /^(\d{1,2}[./-]\d{1,2})[./-]\d{4}$/.test(s) ||
        (/\b\d{4}\b/.test(s) && /[A-Z][a-z]{2}\s[A-Z][a-z]{2}\s\d{2}/.test(s));
    }

    function formatCellDisplay(value) {
      const s = String(value || "").trim();
      const dateArtifact = s.match(/^(\d{1,2})[./-](\d{1,2})[./-]2006$/);
      if (dateArtifact) return `${Number(dateArtifact[1])}.${Number(dateArtifact[2])}.2`;
      return s || "—";
    }

    function resolveCellDisplay(item) {
      const current = String(item?.cell || "").trim();
      if (current && !isLikelyDateCell(current)) return formatCellDisplay(current);
      const code = normalizeKey(item?.partCode || "");
      if (code && partsLookupByCode.has(code)) return formatCellDisplay(partsLookupByCode.get(code)?.cell);
      const name = normalizeKey(item?.partName || "");
      if (name && partsLookupByName.has(name)) return formatCellDisplay(partsLookupByName.get(name)?.cell);
      return "—";
    }

    function resolvePartMeta(item) {
      const itemCell = String(item?.cell || "").trim();
      const byCode = normalizeKey(item?.partCode || "");
      if (byCode && partsLookupByCode.has(byCode)) {
        const catalogPart = partsLookupByCode.get(byCode);
        return { cell: itemCell || catalogPart.cell, stock: catalogPart.stock || "" };
      }
      const byName = normalizeKey(item?.partName || "");
      if (byName && partsLookupByName.has(byName)) {
        const catalogPart = partsLookupByName.get(byName);
        return { cell: itemCell || catalogPart.cell, stock: catalogPart.stock || "" };
      }
      return { cell: itemCell, stock: "" };
    }

    function parseStockValue(raw) {
      const s = String(raw ?? "").trim().replace(/\u00A0|\u202F/g, " ").replace(",", ".");
      if (!s) return NaN;
      const m = s.match(/-?\d+(?:\.\d+)?/);
      const n = parseFloat(m ? m[0] : s);
      return Number.isFinite(n) ? n : NaN;
    }

    function stockTone(stock) {
      const n = parseStockValue(stock);
      if (!Number.isFinite(n)) return "unknown";
      if (n <= 0) return "red";
      if (n < 5) return "low";
      if (n < 10) return "warn";
      return "ok";
    }

    function stockLabel(stock) {
      const n = parseStockValue(stock);
      if (!Number.isFinite(n)) return "—";
      return String(n).replace(/\.0$/, "");
    }

    function normalizeSearchText(value) {
      return String(value || "")
        .toLowerCase()
        .normalize("NFKD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[^0-9a-z\u0400-\u04ff]+/gi, "");
    }

    function searchPartsCatalog(query) {
      const qRaw = String(query || "").trim().toLowerCase();
      const qNorm = normalizeSearchText(qRaw);
      if (!qRaw && !qNorm) return [];

      return partsFullList
        .map(p => {
          const code = String(p.code || "").trim();
          const name = String(p.name || "").trim();
          const cell = String(p.cell || "").trim();
          const stock = String(p.stock || "").trim();
          const rawHaystack = [code, name, cell, stock].join(" ").toLowerCase();
          const normHaystack = normalizeSearchText([code, name, cell, stock].join(" "));
          let score = 0;

          if (qRaw && (rawHaystack.includes(qRaw) || code.toLowerCase() === qRaw || name.toLowerCase() === qRaw)) score += 100;
          if (qNorm && (normalizeSearchText(code) === qNorm || normalizeSearchText(name) === qNorm)) score += 90;
          if (qNorm && (normalizeSearchText(code).includes(qNorm) || normalizeSearchText(name).includes(qNorm) || normalizeSearchText(cell).includes(qNorm))) score += 50;
          if (qRaw && rawHaystack.includes(qRaw)) score += 20;
          if (qNorm && normHaystack.includes(qNorm)) score += 10;

          if (!score) return null;
          const stockVal = parseStockValue(stock);
          const hasStock = Number.isFinite(stockVal) && stockVal > 0;
          return { ...p, _score: score, _hasStock: hasStock };
        })
        .filter(Boolean)
        .sort((a, b) => {
          if (a._hasStock !== b._hasStock) return a._hasStock ? -1 : 1;
          return b._score - a._score || String(a.name || "").localeCompare(String(b.name || ""), "uk");
        })
        .slice(0, 20);
    }

    function escapeRegExp(value) {
      return String(value || "").replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    }

    function highlightMatch(text, query) {
      const source = String(text || "");
      const q = String(query || "").trim();
      if (!q) return escapeHtml(source);
      const rx = new RegExp(escapeRegExp(q), "ig");
      if (!rx.test(source)) return escapeHtml(source);
      rx.lastIndex = 0;
      let out = "";
      let last = 0;
      for (let m; (m = rx.exec(source));) {
        out += escapeHtml(source.slice(last, m.index));
        out += `<mark style="background:rgba(250,204,21,0.35);padding:0 2px;border-radius:4px;">${escapeHtml(m[0])}</mark>`;
        last = m.index + m[0].length;
      }
      out += escapeHtml(source.slice(last));
      return out;
    }

    function renderSuggestionItem(part, query) {
      const stockClass = stockTone(part.stock);
      const stockText = stockLabel(part.stock);
      const code = String(part.code || "").trim();
      const name = String(part.name || "").trim();
      const cell = formatCellDisplay(part.cell);
      const metaParts = [];
      if (cell && cell !== "—") metaParts.push(`<span class="suggest-pill">🗄 <strong>${highlightMatch(cell, query)}</strong></span>`);
      metaParts.push(`<span class="suggest-pill stock-${stockClass}">📦 <strong>${escapeHtml(stockText)}</strong></span>`);
      return `
        <div class="suggest-title-row">
          <div class="suggest-title">${highlightMatch(name || code || "Без названия", query)}</div>
          ${code ? `<div class="suggest-code">${highlightMatch(code, query)}</div>` : ""}
        </div>
        <div class="suggest-meta">${metaParts.join("")}</div>
      `;
    }

    function normalizeCellKey(cell) {
      let s = String(cell || "").trim().toLowerCase();
      s = s.replace(/\s+/g, "");
      s = s.replace(/,/g, ".");
      s = s.split(".").map(seg => (/^\d+$/.test(seg) ? String(parseInt(seg, 10)) : seg)).join(".");
      return s;
    }

    function splitCellSegments(cell) {
      return normalizeCellKey(cell)
        .split(".")
        .filter(Boolean)
        .map(seg => (/^\d+$/.test(seg) ? Number(seg) : seg));
    }

    function compareCells(a, b) {
      const aa = splitCellSegments(a);
      const bb = splitCellSegments(b);
      if (!aa.length && !bb.length) return 0;
      if (!aa.length) return 1;
      if (!bb.length) return -1;

      const len = Math.max(aa.length, bb.length);
      for (let i = 0; i < len; i += 1) {
        const av = aa[i];
        const bv = bb[i];
        if (av === undefined) return -1;
        if (bv === undefined) return 1;
        if (typeof av === "number" && typeof bv === "number") {
          if (av !== bv) return av - bv;
          continue;
        }
        const cmp = String(av).localeCompare(String(bv), "uk", { sensitivity: "base" });
        if (cmp !== 0) return cmp;
      }
      return 0;
    }

    function getSortedItems() {
      if (!currentRequest?.items?.length) return [];
      return currentRequest.items
        .map((item, index) => ({ ...item, _index: index }))
        .sort((a, b) => {
          const byCell = compareCells(resolveCellDisplay(a), resolveCellDisplay(b));
          if (byCell !== 0) return byCell;
          const byCode = String(a.partCode || "").localeCompare(String(b.partCode || ""), "uk");
          if (byCode !== 0) return byCode;
          return String(a.partName || "").localeCompare(String(b.partName || ""), "uk");
        });
    }

    function getRemainingQty(item) {
      const liveItem = Number.isFinite(Number(item?._index)) && currentRequest?.items?.[item._index]
        ? currentRequest.items[item._index]
        : item;
      const requested = Math.max(0, Number(liveItem?.quantityRequested || 0));
      const issued = Math.max(0, Number(liveItem?.quantityIssued || 0));
      return Math.max(0, requested - issued);
    }

    function getCurrentPickItem() {
      return pickState.sorted.find(item => !pickState.done.has(item._index) && !pickState.skipped.has(item._index) && getRemainingQty(item) > 0) || null;
    }

    function renderPickPanel() {
      const targetEl = document.getElementById("pickTarget");
      const subEl = document.getElementById("pickTargetSub");
      const summaryEl = document.getElementById("pickSummary");
      const missingEl = document.getElementById("pickMissingSummary");
      if (!targetEl || !subEl || !summaryEl || !missingEl) return;

      const total = pickState.sorted.length;
      const doneCount = pickState.sorted.filter(item => pickState.done.has(item._index)).length;
      const missingCount = pickState.missing.length;
      const trelloCount = pickState.trello.length;
      const current = getCurrentPickItem();

      summaryEl.innerHTML = `
        <span>Готово: <strong>${doneCount}</strong> / ${total}</span>
        <span>Нет на складе: <strong>${missingCount}</strong></span>
        <span>В Trello: <strong>${trelloCount}</strong></span>
      `;

      if (!current) {
        targetEl.textContent = total ? "Все позиции пройдены" : "Позиции не найдены";
        subEl.textContent = total ? "Можно отправлять выдачу или оформить заявки на нехватку." : "Проверь список заявки.";
      } else {
        const meta = resolvePartMeta(current);
        const stock = stockLabel(meta.stock);
        const tone = stockTone(meta.stock);
        targetEl.innerHTML = `
          <span class="pick-target-main">${current.partName || "Без названия"}${current.partCode ? ` • ${current.partCode}` : ""}</span>
          <div class="pick-stats">
            <span class="pick-pill pick-due">К выдаче <input id="pickQtyInput" type="number" min="0" max="${getRemainingQty(current)}" value="${savedQtyValues[String(current._index)] || getRemainingQty(current)}" oninput="syncPickQtyToTable(this)" style="width:48px;text-align:center;border:none;background:transparent;font-weight:700;font-size:14px;" /></span>
            <span class="pick-pill stock-${tone}">На складе <strong>${stock}</strong></span>
          </div>
        `;
        subEl.textContent = `Ячейка: ${resolveCellDisplay(current)}`;
      }

      missingEl.style.display = pickState.missing.length ? "" : "none";
      missingEl.innerHTML = pickState.missing.length
        ? `<div>Нехватка: <strong>${pickState.missing.length}</strong></div>` + pickState.missing.map(item =>
            `<div>• ${item.code || item.name || "—"} | ${item.qty} шт. | ${item.cell || "—"}</div>`
          ).join("")
        : "";
    }

    function markItemDone(index, qty) {
      const item = pickState.sorted.find(row => row._index === index);
      if (!item) return;

      const original = currentRequest.items[index];
      if (!original) return;

      const safeQty = Math.max(0, Number(qty || 0));
      original.quantityIssued = safeQty;
      pickState.done.add(index);
      savedQtyValues[String(index)] = String(safeQty);

      renderRequest();
      renderPickPanel();
    }

    function syncPickQtyToTable(input) {
      const current = getCurrentPickItem();
      if (!current) return;
      const val = Math.max(0, parseInt(input.value) || 0);
      savedQtyValues[String(current._index)] = String(val);
      const display = document.querySelector(`#requestBody .qty-display[data-index="${CSS.escape(String(current._index))}"]`);
      if (display) display.textContent = String(val);
    }

    function skipCurrentItem() {
      const current = getCurrentPickItem();
      if (!current) return;
      pickState.skipped.add(current._index);
      renderRequest();
      renderPickPanel();
    }

    function addMissingItemToList(index, qty) {
      const item = pickState.sorted.find(row => row._index === index);
      if (!item) return;
      const safeQty = Math.max(1, Number(qty || 1));
      pickState.missing.push({
        code: item.partCode || "",
        name: item.partName || "",
        cell: resolveCellDisplay(item),
        qty: safeQty
      });
      pickState.done.add(index);
      renderRequest();
      renderPickPanel();
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function activateQtyEdit(el, evt) {
      if (evt) evt.stopPropagation();
      const idx = Number(el.dataset.index);
      const code = el.dataset.code;
      const currentVal = el.textContent.trim();
      const item = currentRequest && currentRequest.items ? currentRequest.items[idx] : null;
      const maxQty = item ? (item.quantityRequested || 999) : 999;
      const input = document.createElement("input");
      input.type = "number";
      input.min = "0";
      input.max = String(maxQty);
      input.value = currentVal;
      input.className = "qty-input";
      input.dataset.index = String(idx);
      input.dataset.code = code;
      input.style.cssText = "width:50px;text-align:center;border:1px solid var(--accent,#f2c94c);border-radius:6px;padding:2px 4px;font-size:13px;";
      el.replaceWith(input);
      input.focus();
      input.select();
      const save = () => {
        const val = Math.max(0, parseInt(input.value) || 0);
        savedQtyValues[String(idx)] = String(val);
        const span = document.createElement("span");
        span.className = "qty-display";
        span.dataset.index = String(idx);
        span.dataset.code = code;
        span.onclick = function(e) { activateQtyEdit(this, e); };
        span.style.cssText = "cursor:pointer;padding:4px 8px;border-radius:6px;border:1px dashed var(--border,#ccc);display:inline-block;min-width:32px;text-align:center;";
        span.textContent = String(val);
        input.replaceWith(span);
      };
      input.addEventListener("blur", save);
      input.addEventListener("keydown", (e) => {
        if (e.key === "Enter") { e.preventDefault(); save(); }
        if (e.key === "Escape") {
          const span = document.createElement("span");
          span.className = "qty-display";
          span.dataset.index = String(idx);
          span.dataset.code = code;
          span.onclick = function(e) { activateQtyEdit(this, e); };
          span.style.cssText = "cursor:pointer;padding:4px 8px;border-radius:6px;border:1px dashed var(--border,#ccc);display:inline-block;min-width:32px;text-align:center;";
          span.textContent = currentVal;
          input.replaceWith(span);
        }
      });
    }

    function statusLabel(status) {
      return ({ pending: "Ожидает", processing: "В обработке", issued: "Выдано", returned: "Возврат", cancelled: "Отменено" }[status] || status || "—");
    }

    function statusMeta(status) {
      const label = statusLabel(status);
      return status === "returned" ? `<span class="status-returned">${label}</span>` : label;
    }

    function renderRequest() {
      const r = currentRequest;
      if (!r) return;

      document.querySelectorAll("#requestBody .qty-display").forEach(el => {
        savedQtyValues[el.dataset.index] = el.textContent.trim();
      });

      document.getElementById("requestTitle").textContent = `${r.id} — ${r.masterName}`;
      document.getElementById("requestSubtitle").textContent = r.equipmentId ? `Оборудование: ${r.equipmentId}` : "";

      const meta = [];
      meta.push(`Мастер: ${r.masterName} (${r.masterLogin})`);
      meta.push(`Статус: ${statusMeta(r.status)}`);
      if (r.createdAt) meta.push(`Создано: ${new Date(r.createdAt).toLocaleString("ru-RU")}`);
      if (r.processedAt) meta.push(`Выдано: ${new Date(r.processedAt).toLocaleString("ru-RU")}`);
      if (r.adminName) meta.push(`Админ: ${r.adminName}`);
      if (r.comment) meta.push(`Комментарий: ${r.comment}`);
      document.getElementById("requestMeta").innerHTML = meta.map(t => `<div>${t}</div>`).join("");

      const isIssued = r.status === "issued" || r.status === "returned";
      const canIssue = r.status === "pending" || r.status === "processing";
      document.getElementById("issue-btn").style.display = canIssue ? "" : "none";
      document.getElementById("return-btn").style.display = isIssued ? "" : "none";
      document.getElementById("cancel-issued-btn").style.display = isIssued ? "" : "none";

      const downloadBtn = document.getElementById("download-btn");
      if (isIssued) {
        downloadBtn.style.display = "";
        downloadBtn.onclick = () => {
          window.location.href = `/api/spare-request/${r.id}/export-xls?k=${encodeURIComponent(getPwaKey())}`;
        };
      } else {
        downloadBtn.style.display = "none";
      }

      const body = document.getElementById("requestBody");
      const items = getSortedItems();
      if (!items.length) {
        body.innerHTML = `<tr><td colspan="6" class="muted">Позиции отсутствуют</td></tr>`;
        return;
      }

      body.innerHTML = items.map((item, idx) => `
        <tr class="${pickState.done.has(item._index) || pickState.skipped.has(item._index) ? "pick-done-row" : ""} ${getCurrentPickItem()?._index === item._index ? "pick-current-row" : ""} ${selectedRowIndex === item._index ? "pick-selected-row" : ""}" onclick="selectTableRow(${item._index})" style="cursor:pointer;">
          <td>${idx + 1}</td>
          <td>
            <div style="display:flex; gap:8px; align-items:flex-start; flex-wrap:wrap;">
              <span>${item.partName || ""}</span>
              <span class="stock-badge stock-${stockTone(resolvePartMeta(item).stock)}">На складе: ${stockLabel(resolvePartMeta(item).stock)}</span>
            </div>
          </td>
          <td style="font-size:11px; color:var(--muted, #888);">${item.partCode || ""}</td>
          <td style="font-size:11px;">${resolveCellDisplay(item)}</td>
          <td>${item.unit || "шт."}</td>
          <td>${isIssued
            ? `<div class="return-qty-wrap">
                <span>${item.quantityIssued || "—"}</span>
                <input class="return-qty-input" type="number" min="0" max="${item.quantityIssued || 0}" value="0" data-code="${escapeHtml(item.partCode || "")}" data-index="${item._index}" aria-label="Вернуть ${escapeHtml(item.partName || item.partCode || "")}">
              </div>`
          : `<span class="qty-display" data-index="${item._index}" data-code="${escapeHtml(item.partCode || "")}" onclick="activateQtyEdit(this, event)" style="cursor:pointer;padding:4px 8px;border-radius:6px;border:1px dashed var(--border,#ccc);display:inline-block;min-width:32px;text-align:center;">${pickState.skipped.has(item._index) ? 0 : (item.quantityIssued || item.quantityRequested || 0)}</span>`
          }</td>
        </tr>
      `).join("");
      document.querySelectorAll("#requestBody .qty-display").forEach(el => {
        if (savedQtyValues[el.dataset.index] !== undefined) {
          el.textContent = savedQtyValues[el.dataset.index];
        }
      });
      renderPickPanel();
    }

    function selectTableRow(index) {
      selectedRowIndex = selectedRowIndex === index ? null : index;
      renderRequest();
    }

    function getSelectedItemForTrello() {
      if (selectedRowIndex !== null) {
        const items = getSortedItems();
        return items.find(it => it._index === selectedRowIndex) || null;
      }
      return getCurrentPickItem();
    }

    async function loadRequest() {
      const id = new URLSearchParams(window.location.search).get("id") || "";
      if (!id) {
        window.location.href = "/spare-requests-admin.html?v=20260611-12";
        return;
      }

      document.getElementById("requestTitle").textContent = "Загрузка...";
      const resp = await apiFetch(`/api/spare-request/${encodeURIComponent(id)}`);
      const out = await resp.json();
      if (!out.ok) throw new Error(out.error || "load_failed");
      currentRequest = out.request;
      await loadPartsCatalog();
      console.log("[catalog] loaded:", partsFullList.length);
      savedQtyValues = {};
      pickState = {
        done: new Set(),
        skipped: new Set(),
        missing: [],
        trello: [],
        sorted: getSortedItems()
      };
      renderRequest();
    }

    async function issueRequest() {
      const r = currentRequest;
      if (!r) return;

      const admin = window.SurpAuth?.getCurrentUser?.();
      const adminName = admin?.name || prompt("Введи своё имя:") || "";
      if (!adminName) return;

      const items = (r.items || [])
        .map((item, idx) => ({ item, idx }))
        .filter(({ idx }) => !pickState.skipped.has(idx))
        .map(({ item, idx }) => ({
          itemId: item.id,
          partCode: item.partCode,
          quantityIssued: parseInt(savedQtyValues[String(idx)] || String(item.quantityIssued || "")) || parseInt(item.quantityRequested) || 0
        }));

      try {
        const resp = await apiFetch(`/api/spare-request/${r.id}/issue`, {
          method: "POST",
          body: JSON.stringify({ adminName, items })
        });
        const out = await resp.json();
        if (!out.ok) throw new Error(out.error);
        await loadRequest();
      } catch (e) {
        alert("❌ " + (e.message || "Ошибка"));
      }
    }

    async function returnIssuedParts() {
      const r = currentRequest;
      if (!r) return;

      const admin = window.SurpAuth?.getCurrentUser?.();
      const adminName = admin?.name || prompt("Введи своё имя:") || "";
      if (!adminName) return;

      const inputs = document.querySelectorAll("#requestBody .return-qty-input");
      const items = Array.from(inputs)
        .map(inp => ({
          partCode: inp.dataset.code,
          quantityReturned: Math.max(0, Number(inp.value || 0)),
        }))
        .filter(item => item.quantityReturned > 0);

      if (!items.length) {
        alert("Укажи количество, которое мастер возвращает.");
        return;
      }

      try {
        const resp = await apiFetch(`/api/spare-request/${r.id}/return`, {
          method: "POST",
          body: JSON.stringify({
            adminName,
            comment: `Возврат по заявке ${r.id}`,
            items,
          }),
        });
        const out = await resp.json();
        if (!out.ok) throw new Error(out.error);
        alert("✅ Возврат оформлен.");
        await loadRequest();
      } catch (e) {
        alert("❌ " + (e.message || "Ошибка"));
      }
    }

    async function cancelIssuedRequest() {
      const r = currentRequest;
      if (!r) return;

      if (!confirm(`Отменить выдачу ${r.id} и вернуть все выданные позиции?`)) return;

      const admin = window.SurpAuth?.getCurrentUser?.();
      const adminName = admin?.name || prompt("Введи своё имя:") || "";
      if (!adminName) return;

      try {
        const resp = await apiFetch(`/api/spare-request/${r.id}/cancel-issued`, {
          method: "POST",
          body: JSON.stringify({
            adminName,
            comment: `Отмена выдачи ${r.id}`,
          }),
        });
        const out = await resp.json();
        if (!out.ok) throw new Error(out.error);
        alert("✅ Выдача отменена, возврат оформлен.");
        await loadRequest();
      } catch (e) {
        alert("❌ " + (e.message || "Ошибка"));
      }
    }

    function shareMissingList() {
      if (!pickState.missing.length) {
        alert("Пока нет позиций для добавления в заявку.");
        return;
      }

      const text = [
        `Нехватка по запросу ${currentRequest?.id || ""}`,
        "",
        ...pickState.missing.map(item => `${item.code || item.name || "—"} | ${item.name || "—"} | ячейка: ${item.cell || "—"} | кол-во: ${item.qty}`)
      ].join("\n");

      if (navigator.share) {
        navigator.share({ title: "Нехватка запчастей", text }).catch(() => {});
        return;
      }

      navigator.clipboard?.writeText(text).then(() => {
        alert("Текст нехватки скопирован.");
      }).catch(() => {
        prompt("Скопируй список:", text);
      });
    }

    async function addCurrentToTrello() {
      const current = getSelectedItemForTrello();
      if (!current) {
        openAddModal();
        return;
      }

      const remaining = getRemainingQty(current);
      const qty = Math.max(1, Number(prompt(
        `Сколько добавить в заявку по позиции "${current.partName || current.partCode || "—"}"?`,
        String(remaining || 1)
      ) || 0));

      const code = String(current.partCode || "").trim() || String(current.partName || "").trim();
      if (!code) {
        alert("Не удалось определить код позиции.");
        return;
      }

      const cardName = `${code} x ${qty}`;
      const desc = [
        `Запрос: ${currentRequest?.id || ""}`,
        `Позиция: ${current.partName || "—"}`,
        `Ячейка: ${resolveCellDisplay(current)}`,
      ].join("\n");

      try {
        const resp = await apiFetch("/api/spare-request/trello-card", {
          method: "POST",
          body: JSON.stringify({ name: cardName, desc }),
        });
        const out = await resp.json();
        if (!out.ok) throw new Error(out.error || "trello_failed");

        pickState.trello.push({ code, qty, title: cardName });
        pickState.done.add(current._index);
        pickState.skipped.add(current._index);
        selectedRowIndex = null;
        renderRequest();
        renderPickPanel();
      } catch (e) {
        alert("❌ " + (e.message || "Ошибка Trello"));
      }
    }

    function openReplaceModal() {
      const current = getCurrentPickItem();
      if (!current) { alert("Нет текущей позиции для замены."); return; }
      replaceCurrentItem = current;
      replaceSelectedItem = null;
      document.getElementById("replaceCurrentLabel").textContent = `Замена для: ${current.partName || ""}${current.partCode ? ` (${current.partCode})` : ""} — ${getRemainingQty(current)} шт.`;
      document.getElementById("replace-search-input").value = "";
      document.getElementById("replace-search-suggest").innerHTML = "";
      document.getElementById("replaceConfirmBtn").disabled = true;
      document.getElementById("replaceConfirmBtn").textContent = "Заменить";
      document.getElementById("replaceModal").style.display = "flex";
      document.getElementById("replace-search-input").focus();
    }

    function openAddModal() {
      replaceCurrentItem = null;
      replaceSelectedItem = null;
      document.getElementById("replaceCurrentLabel").textContent = "Добавить позицию в заявку";
      document.getElementById("replace-search-input").value = "";
      document.getElementById("replace-search-suggest").innerHTML = "";
      document.getElementById("replaceConfirmBtn").disabled = true;
      document.getElementById("replaceConfirmBtn").textContent = "Добавить";
      document.getElementById("replaceModal").style.display = "flex";
      document.getElementById("replace-search-input").focus();
    }

    function closeReplaceModal() {
      document.getElementById("replaceModal").style.display = "none";
      const s = document.getElementById("replace-search-suggest");
      s.innerHTML = "";
      s.style.display = "none";
      replaceCurrentItem = null;
      replaceSelectedItem = null;
    }

    function filterPartsForReplace(query) {
      try {
        return searchPartsCatalog(query);
      } catch (e) {
        console.error("[replace-search] filter error:", e);
        return [];
      }
    }

    async function confirmReplace() {
      const r = currentRequest;
      if (!r) return;
      if (!replaceSelectedItem) {
        const query = document.getElementById("replace-search-input")?.value || "";
        replaceSelectedItem = searchPartsCatalog(query)[0] || null;
        if (!replaceSelectedItem) {
          alert("Сначала выбери запчасть из поиска.");
          return;
        }
      }
      const isReplace = !!replaceCurrentItem;
      const qty = isReplace ? getRemainingQty(replaceCurrentItem) : 1;
      try {
        const resp = await apiFetch(`/api/spare-request/${r.id}/add-item`, {
          method: "POST",
          body: JSON.stringify({
            partCode: replaceSelectedItem.code,
            partName: replaceSelectedItem.name,
            cell: replaceSelectedItem.cell || "",
            unit: "шт.",
            quantity: qty,
          })
        });
        const out = await resp.json();
        if (!out.ok) throw new Error(out.error || "add_failed");
        if (isReplace && replaceCurrentItem.id) {
          await apiFetch(`/api/spare-request/${r.id}/remove-item`, {
            method: "POST",
            body: JSON.stringify({ itemId: replaceCurrentItem.id })
          });
        }
        closeReplaceModal();
        await loadRequest();
      } catch (e) {
        alert("❌ " + (e.message || "Ошибка при добавлении запчасти"));
      }
    }

    window.addEventListener("load", async () => {
      await window.SurpAuth?.init?.();
      const user = window.SurpAuth?.getCurrentUser?.();
      if (!user) return;
      const role = user.role || "";
      if (role !== "admin" && role !== "manager") {
        document.querySelector(".app-main").innerHTML = "<div class='empty' style='padding:60px;'><h2>🚫 Доступ запрещён</h2><p style='margin:12px 0;'>У вас нет прав для просмотра этой страницы.</p><button class='btn primary' onclick=\"window.location.href='/';\">На главную</button></div>";
        document.querySelector(".app-main").style.display = "block";
        return;
      }

      document.getElementById("issue-btn").addEventListener("click", issueRequest);
      document.getElementById("return-btn").addEventListener("click", returnIssuedParts);
      document.getElementById("cancel-issued-btn").addEventListener("click", cancelIssuedRequest);
      document.getElementById("refresh-btn").addEventListener("click", () => loadRequest().catch(e => alert("❌ " + (e.message || "Ошибка"))));
      document.getElementById("pickIssueBtn").addEventListener("click", () => {
        const current = getCurrentPickItem();
        if (!current) return;
        const qtyInput = document.getElementById("pickQtyInput");
        const qty = Math.max(1, Number(qtyInput?.value || current.quantityRequested || 1));
        markItemDone(current._index, qty);
      });
      document.getElementById("pickSkipBtn").addEventListener("click", skipCurrentItem);
      document.getElementById("pickMissingBtn").addEventListener("click", addCurrentToTrello);
      document.getElementById("pickReplaceBtn").addEventListener("click", openReplaceModal);
      document.getElementById("pickAddBtn").addEventListener("click", openAddModal);
      document.getElementById("requestBody").addEventListener("change", (e) => {
        if (e.target.classList.contains("qty-input")) {
          const idx = Number(e.target.dataset.index);
          const val = Math.max(0, parseInt(e.target.value) || 0);
          savedQtyValues[e.target.dataset.index] = String(val);
        }
      });
      document.getElementById("replaceConfirmBtn").addEventListener("click", confirmReplace);
      document.getElementById("replaceModal").addEventListener("click", (e) => {
        if (e.target === document.getElementById("replaceModal")) closeReplaceModal();
      });

      const replaceSearchInput = document.getElementById("replace-search-input");
      const replaceSuggest = document.getElementById("replace-search-suggest");
      if (replaceSearchInput && replaceSuggest) {
        function positionSuggest() {
          const rect = replaceSearchInput.getBoundingClientRect();
          const top = rect.bottom + 6;
          const maxH = Math.min(300, window.innerHeight - top - 12);
          Object.assign(replaceSuggest.style, {
            position: "fixed",
            top: top + "px",
            left: rect.left + "px",
            width: rect.width + "px",
            maxHeight: Math.max(60, maxH) + "px",
            zIndex: "2147483647",
            display: "block"
          });
        }

        replaceSearchInput.addEventListener("input", () => {
          const q = replaceSearchInput.value.trim();
          const results = filterPartsForReplace(q);
          console.log("[replace] query:", JSON.stringify(q), "results:", results.length);
          replaceSuggest.innerHTML = "";
          const prevSelected = replaceSelectedItem;
          if (prevSelected) {
            const prevLabel = `${prevSelected.name || ""} (${prevSelected.code || ""})`.trim();
            if (replaceSearchInput.value.trim() !== prevLabel) {
              replaceSelectedItem = null;
            }
          }
          document.getElementById("replaceConfirmBtn").disabled = !(replaceSelectedItem || results.length);
          if (!results.length) {
            replaceSuggest.innerHTML = `<div class="suggest-empty">Ничего не найдено</div>`;
            replaceSuggest.style.display = "block";
            return;
          }
          const ul = document.createElement("ul");
          ul.className = "suggest-list";
          results.forEach(p => {
            const li = document.createElement("li");
            li.className = "suggest-item";
            li.innerHTML = renderSuggestionItem(p, q);
            li.addEventListener("click", () => {
              replaceSelectedItem = p;
              replaceSearchInput.value = `${p.name || ""} (${p.code || ""})`.trim();
              replaceSuggest.innerHTML = "";
              replaceSuggest.style.display = "none";
              document.getElementById("replaceConfirmBtn").disabled = false;
            });
            ul.appendChild(li);
          });
          replaceSuggest.appendChild(ul);
          positionSuggest();
        });
        replaceSearchInput.addEventListener("keydown", (e) => {
          if (e.key === "Enter") {
            e.preventDefault();
            const first = replaceSuggest.querySelector("li");
            if (first) first.click();
            else document.getElementById("replaceConfirmBtn").click();
          }
        });
        document.addEventListener("click", (e) => {
          if (!replaceSearchInput.contains(e.target) && !replaceSuggest.contains(e.target)) {
            replaceSuggest.innerHTML = "";
            replaceSuggest.style.display = "none";
          }
        });
      }

      try {
        await loadRequest();
        document.querySelector(".app-main").style.display = "block";
      } catch (e) {
        document.getElementById("requestBody").innerHTML = `<tr><td colspan="6" class="muted">❌ ${e.message || "Ошибка"}</td></tr>`;
        document.querySelector(".app-main").style.display = "block";
      }
    });
  </script>
</body>
</html>
