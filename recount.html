<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <title>Переучет склада</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="/style.css?v=1.1.4" />
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/exceljs@4.3.0/dist/exceljs.min.js"></script>
</head>
<body class="recount-page">
  <header class="recount-toolbar">
    <a href="/index.html" class="btn ghost" title="Назад">←</a>
    <button id="save-recount-btn" class="btn ghost" type="button" title="Сохранить">💾</button>
    <button id="add-found-btn" class="btn ghost" type="button" title="Добавить найденный товар">➕</button>
    <button id="export-recount-btn" class="btn primary" type="button" title="Экспорт и завершение">📤</button>
  </header>

  <main class="recount-main">
    <section class="card recount-range-card">
      <h2>Переучет</h2>
      <div class="row">
        <div class="field">
          <label>Диапазон от (например 0.1)</label>
          <input id="recount-range-from" type="text" placeholder="0.1" />
        </div>
        <div class="field">
          <label>Диапазон до (необязательно)</label>
          <input id="recount-range-to" type="text" placeholder="до конца файла" />
        </div>
        <button id="build-recount-btn" class="btn primary" type="button">Сформировать</button>
      </div>
      <div id="recount-session-meta" class="muted"></div>
    </section>

    <section id="recount-found-form" class="card recount-found-form" style="display:none;">
      <div class="field">
        <label>Артикул</label>
        <input id="recount-found-code" type="text" placeholder="Артикул" />
      </div>
      <div class="field">
        <label>Ячейка (опционально)</label>
        <input id="recount-found-cell" type="text" placeholder="Например 1.2" />
      </div>
      <div class="field">
        <label>Количество</label>
        <input id="recount-found-fact" type="number" min="0" step="0.01" value="1" />
      </div>
      <button id="recount-found-apply" class="btn primary" type="button">Добавить</button>
    </section>

    <section class="card">
      <div class="parts-request-table-wrap recount-table-wrap">
        <table class="parts-request-table recount-table">
          <thead>
            <tr>
              <th>Ячейка</th>
              <th>Артикул</th>
              <th>Кол-во</th>
              <th>Наименование</th>
            </tr>
          </thead>
          <tbody id="recount-body"></tbody>
        </table>
      </div>
    </section>
    <div id="warehouse-alert"></div>
  </main>

  <script src="/recount.js"></script>
</body>
</html>
